              else if (k.startsWith('est:'))
                S.fil.est.delete(decodeURIComponent(k.slice(4)))
              else if (k.startsWith('suc:'))
                S.fil.suc.delete(decodeURIComponent(k.slice(4)))
              else if (k === 'desde') S.fil.desde = ''
              else if (k === 'hasta') S.fil.hasta = ''
              else if (k === 'grupo') S.fil.grupo = ''
              R()
            })
        )
        const filClear = $('filClear')
        if (filClear)
          filClear.onclick = () => {
            S.fil = {
              q: '',
              nivel: new Set(),
              est: new Set(),
              suc: new Set(),
              desde: '',
              hasta: '',
              preset: '',
              grupo: '',
            }
            R()
          }
        /* Multiselect filter (tickets) */
        document.querySelectorAll('[data-ms-open]').forEach(
          (b) =>
            (b.onclick = (e) => {
              e.stopPropagation()
              const pop = $('msp_' + b.dataset.msOpen)
              if (pop) {
                document.querySelectorAll('.ms-pop.on').forEach((p) => {
                  if (p !== pop) p.classList.remove('on')
                })
                pop.classList.toggle('on')
              }
            })
        )
        document.querySelectorAll('[data-ms-toggle]').forEach(
          (cb) =>
            (cb.onchange = () => {
              const id = cb.dataset.msToggle
              const val = decodeURIComponent(cb.dataset.msVal)
              const s =
                { est: S.fil.est, urg: S.fil.nivel, suc: S.fil.suc }[id] || S.fil.nivel
              if (cb.checked) s.add(val)
              else s.delete(val)
              R()
            })
        )
        document.querySelectorAll('[data-ms-all]').forEach(
          (b) =>
            (b.onclick = () => {
              const id = b.dataset.msAll
              const opts = document.querySelectorAll('[data-ms-toggle="' + id + '"]')
              const s =
                { est: S.fil.est, urg: S.fil.nivel, suc: S.fil.suc }[id] || S.fil.nivel
              opts.forEach((o) => {
                s.add(decodeURIComponent(o.dataset.msVal))
              })
              R()
            })
        )
        document.querySelectorAll('[data-ms-none]').forEach(
          (b) =>
            (b.onclick = () => {
              const id = b.dataset.msNone
              ;(
                ({ est: S.fil.est, urg: S.fil.nivel, suc: S.fil.suc })[id] ||
                S.fil.nivel
              ).clear()
              R()
            })
        )
        /* Multiselect reports */
        document.querySelectorAll('[data-rms-open]').forEach(
          (b) =>
            (b.onclick = (e) => {
              e.stopPropagation()
              const pop = $('rmsp_' + b.dataset.rmsOpen)
              if (pop) {
                document.querySelectorAll('.ms-pop.on').forEach((p) => {
                  if (p !== pop) p.classList.remove('on')
                })
                pop.classList.toggle('on')
              }
            })
        )
        document.querySelectorAll('[data-rms-toggle]').forEach(
          (cb) =>
            (cb.onchange = () => {
              const id = cb.dataset.rmsToggle
              const val = decodeURIComponent(cb.dataset.rmsVal)
              const s =
                {
                  est: S.repFilter.est,
                  urg: S.repFilter.urg,
                  suc: S.repFilter.suc,
                  tec: S.repFilter.tec,
                }[id] || S.repFilter.est
              if (cb.checked) s.add(val)
              else s.delete(val)
              S.repFilter.preset = ''
              S.view = 'reports'
              R()
            })
        )
        document.querySelectorAll('[data-rms-all]').forEach(
          (b) =>
            (b.onclick = () => {
              const id = b.dataset.rmsAll
              const opts = document.querySelectorAll('[data-rms-toggle="' + id + '"]')
              const s =
                {
                  est: S.repFilter.est,
                  urg: S.repFilter.urg,
                  suc: S.repFilter.suc,
                  tec: S.repFilter.tec,
                }[id] || S.repFilter.est
              opts.forEach((o) => s.add(decodeURIComponent(o.dataset.rmsVal)))
              S.view = 'reports'
              R()
            })
        )
        document.querySelectorAll('[data-rms-none]').forEach(
          (b) =>
            (b.onclick = () => {
              const id = b.dataset.rmsNone
              ;(
                ({
                  est: S.repFilter.est,
                  urg: S.repFilter.urg,
                  suc: S.repFilter.suc,
                  tec: S.repFilter.tec,
                })[id] || S.repFilter.est
              ).clear()
              S.view = 'reports'
              R()
            })
        )
        /* Report presets */
        document.querySelectorAll('[data-rep-preset]').forEach(
          (b) =>
            (b.onclick = () => {
              S.repFilter.preset = b.dataset.repPreset
              S.view = 'reports'
              R()
            })
        )
        const repFD = $('repFD')
        if (repFD)
          repFD.onchange = (e) => {
            S.repFilter.desde = e.target.value
            S.repFilter.preset = ''
            R()
          }
        const repFH = $('repFH')
        if (repFH)
          repFH.onchange = (e) => {
            S.repFilter.hasta = e.target.value
            S.repFilter.preset = ''
            R()
          }
        const repClear = $('repClear')
        if (repClear)
          repClear.onclick = () => {
            S.repFilter = {
              desde: '',
              hasta: '',
              preset: '',
              est: new Set(),
              urg: new Set(),
              suc: new Set(),
              tec: new Set(),
            }
            R()
          }
        const repPrint = $('repPrint')
        if (repPrint) repPrint.onclick = () => window.print()
        const repCsv = $('repCsv')
        if (repCsv)
          repCsv.onclick = () => {
            let csv =
              'ID,Titulo,Sucursal,Urgencia,Estado,Categoria,Tecnico,Creado,Cierre\n'
            ;(S.tickets || []).forEach((t) => {
              csv +=
                '"' +
                t.Ticket_ID +
                '","' +
                t.Titulo +
                '","' +
                (t.Sucursal || '') +
                '","' +
                t.Urgencia +
                '","' +
                t.Estado +
                '","' +
                (t.Categoria || '') +
                '","' +
                (t.Tecnico || '') +
                '","' +
                t.Fecha_Creacion +
                '","' +
                (t.Fecha_Cierre || '') +
                '"\n'
            })
            const a = document.createElement('a')
            a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv)
            a.download = 'tickets_' + new Date().toISOString().split('T')[0] + '.csv'
            a.click()
          }
        /* Ticket rows */
        document
          .querySelectorAll('tr[data-tid], .tr[data-tid], .ticket-card[data-tid]')
          .forEach((row) => {
            row.onclick = (e) => {
              if (
                e.target.closest('[data-row-del]') ||
                e.target.closest('input[type=checkbox]')
              )
                return
              const tid = row.dataset.tid
              const t = S.tickets.find((x) => x.Ticket_ID === tid)
              if (!t) return
              S.sel = t
              S.tab = 'info'
              S.newAvanceOpen = false
              S.avanceFiles = []
              S.newAvanceId = null
              S.chatInput = ''
              S.chatMenuOpen = false
              S.splitMode = false
              S.splitItemIds.clear()
              S.expandedItemId = null
              S.mergedListOpen = null
              S.showSysEvents = false
              lp.start()
              const existing = $('overlay')
              if (!existing) {
                const div = document.createElement('div')
                div.innerHTML = panelHTML()
                document.querySelector('.app').appendChild(div.firstChild)
              } else {
                existing.outerHTML = panelHTML()
              }
              lp.done()
              api.hist(tid, (r) => {
                if (r && r.success) {
                  S.hist[tid] = r.historial || []
                  const grp = groupAvances(S.hist[tid])
                  S.items[tid] = grp.items
                  S.adminNotes[tid] = grp.adminNotes
                }
                if (t.Carpeta_Drive) {
                  api.folderFiles(t.Carpeta_Drive, (fr) => {
                    S.files[tid] = fr.files || []
                    rp()
                  })
                } else rp()
              })
              bind()
            }
          })
        document.querySelectorAll('[data-row-del]').forEach((b) => {
          b.onclick = (e) => {
            e.stopPropagation()
            const tid = b.dataset.rowDel
            if (!confirm('¿Eliminar ticket ' + tid + '?')) return
            api.del(tid, (r) => {
              if (r && r.success) {
                S.tickets = S.tickets.filter((t) => t.Ticket_ID !== tid)
                cache.save(S.user, S.tickets)
                if (S.sel && S.sel.Ticket_ID === tid) {
                  S.sel = null
                  const ov = $('overlay')
                  if (ov) ov.remove()
                }
                R()
                toast('Ticket eliminado', 'ok')
              } else toast((r && r.error) || 'Error', 'er')
            })
          }
        })
        /* Checkboxes bulk */
        const cbAll = $('cbAll')
        if (cbAll)
          cbAll.onchange = () => {
            document.querySelectorAll('.cb-row').forEach((c) => {
              c.checked = cbAll.checked
              const tid = c.dataset.cbTid
              if (cbAll.checked) S.selectedTids.add(tid)
              else S.selectedTids.delete(tid)
            })
            R()
          }
        document.querySelectorAll('.cb-row').forEach(
          (c) =>
            (c.onchange = () => {
              if (c.checked) S.selectedTids.add(c.dataset.cbTid)
              else S.selectedTids.delete(c.dataset.cbTid)
              R()
            })
        )
        const bulkDelete = $('bulkDelete')
        if (bulkDelete)
          bulkDelete.onclick = () => {
            if (!confirm('Eliminar ' + S.selectedTids.size + ' tickets?')) return
            const ids = [...S.selectedTids]
            let done = 0
            ids.forEach((tid) =>
              api.del(tid, (r) => {
                if (r && r.success) {
                  S.tickets = S.tickets.filter((t) => t.Ticket_ID !== tid)
                  S.selectedTids.delete(tid)
                }
                if (++done === ids.length) {
                  cache.save(S.user, S.tickets)
                  R()
                  toast(ids.length + ' eliminados', 'ok')
                }
              })
            )
          }
        const bulkMerge = $('bulkMerge')
        if (bulkMerge) bulkMerge.onclick = () => openMergeModal([...S.selectedTids])
        /* KPI click */
        document.querySelectorAll('[data-kpi]').forEach(
          (k) =>
            (k.onclick = () => {
              const map = {
                hoy: 'today',
                vencidos: 'vencidos',
                emergencias: 'urgencia-emergencia',
                proceso: 'abiertos',
                activos: 'abiertos',
                resueltos: 'cerrados',
                sinabordar: 'sinabordar',
              }
              const grpMap = {
                vencidos: 'vencidos',
                activos: 'abiertos',
                resueltos: 'cerrados',
                proceso: 'abiertos',
                sinabordar: 'sinabordar',
              }
              const preMap = { hoy: 'today' }
              S.fil.grupo = grpMap[k.dataset.kpi] || ''
              S.fil.preset = preMap[k.dataset.kpi] || ''
              S.view = 'tickets'
              R()
            })
        )
        /* Dashboard tr rows */
        document.querySelectorAll('.tr[data-tid]').forEach((row) => {
          row.onclick = () => {
            const tid = row.dataset.tid
            const t = S.tickets.find((x) => x.Ticket_ID === tid)
            if (t) {
              S.sel = t
              S.tab = 'info'
              S.newAvanceOpen = false
              S.avanceFiles = []
              S.chatInput = ''
              S.chatMenuOpen = false
              bind()
              R()
            }
          }
        })
        /* Tabs */
        document.querySelectorAll('[data-tab]').forEach(
          (b) =>
            (b.onclick = () => {
              S.tab = b.dataset.tab
              rp()
            })
        )
        const pClose = $('pClose')
        if (pClose)
          pClose.onclick = () => {
            S.sel = null
            S.newAvanceOpen = false
            S.avanceFiles = []
            S.newAvanceId = null
            S.chatInput = ''
            S.chatMenuOpen = false
            const ov = $('overlay')
            if (ov) ov.remove()
            R() // Actualizar lista para reflejar cambios de estado
          }
        document.querySelectorAll('[data-set-est]').forEach(
          (b) =>
            (b.onclick = function () {
              if (!S.sel || S._stateChanging) {
                if (S._stateChanging) toast('Espera...', 'info', 1500)
                return
              }
              doChangeStatus(S.sel, b.dataset.setEst, function () {
                b.disabled = false
              })
            })
        )
        /* Config tabs */
        document.querySelectorAll('[data-cfg]').forEach(
          (b) =>
            (b.onclick = () => {
              S.cfgTab = b.dataset.cfg
              R()
            })
        )
        /* Config actions */

                  .map(
                    ({ e }) =>
                      '<div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;font-size:12px"><div style="font-weight:600;color:var(--t2)">' +
                      String(e.Estado_Anterior || '') +
                      '</div><div style="color:var(--t3);margin-top:3px">' +
                      fDT(e.Fecha) +
                      ' &middot; ' +
                      (e.Usuario || 'sistema') +
                      '</div>' +
                      (e.Nota
                        ? '<div style="color:var(--t2);margin-top:4px;font-size:11px">' +
                          e.Nota +
                          '</div>'
                        : '') +
                      '</div>'
                  )
                  .join('') +
                '</div><div style="text-align:right;margin-top:12px"><button class="btn btn-s" id="sysClose">Cerrar</button></div>'
            )
            ov.querySelector('#sysClose').onclick = () => ov.remove()
          }
        }
      }

      /* ═══ UPLOAD HELPERS ═══ */
      const uploadAvanceFile = async (files) => {
        if (!files || !files.length || !S.sel) return
        for (const file of Array.from(files)) {
          const fid = _uid()
          const ico = fileIco(file.type, file.name)
          const isVid = ico.isVideo || isVideoMime(file.type)
          const list = $('avFileList')
          if (list) {
            const row = document.createElement('div')
            row.className = 'av-file-row uploading'
            row.id = 'avFR_' + fid
            row.innerHTML =
              '<div class="av-file-ico" style="background:' +
              ico.bg +
              '">' +
              ico.lbl +
              '</div><div class="av-file-nm">' +
              file.name +
              '</div><div class="av-file-prog"><div class="av-file-prog-fill" style="width:30%" id="avFP_' +
              fid +
              '"></div></div><div class="av-file-stat" id="avFS_' +
              fid +
              '">Subiendo...</div>'
            list.appendChild(row)
          }
          try {
            const b64 = await toB64(file)
            const prog = $('avFP_' + fid)
            if (prog) prog.style.width = '70%'
            let durSec = null
            if (isVid) {
              try {
                durSec = await getVideoDuration(file)
              } catch (e) {}
            }
            api.upload(
              b64,
              file.name,
              file.type,
              S.sel.Ticket_ID,
              S.newAvanceId || '',
              (r) => {
                const row = $('avFR_' + fid)
                if (r && r.success && r.id) {
                  S.avanceFiles.push({
                    id: r.id,
                    name: r.name || file.name,
                    url: r.url || '',
                    mimeType: r.mimeType || file.type,
                    size: r.size || 0,
                  })
                  const prog = $('avFP_' + fid)
                  if (prog) {
                    prog.style.width = '100%'
                    prog.className = 'av-file-prog-fill done'
                  }
                  if (row) {
                    row.className = 'av-file-row done'
                    const st = $('avFS_' + fid)
                    if (st)
                      st.innerHTML = '<span style="color:var(--gd)">&#10003;</span>'
                    const rmBtn = document.createElement('button')
                    rmBtn.className = 'btn btn-g btn-xs'
                    rmBtn.dataset.avRmFile = r.id
                    rmBtn.textContent = '×'
                    rmBtn.onclick = () => {
                      S.avanceFiles = S.avanceFiles.filter((f) => f.id !== r.id)
                      rp()
                    }
                    row.appendChild(rmBtn)
                  }
                } else {
                  if (row) row.className = 'av-file-row error'
                  const st = $('avFS_' + fid)
                  if (st) st.innerHTML = 'Error'
                  toast('Error subiendo archivo', 'er')
                }
              },
              durSec
            )
          } catch (e) {
            const row = $('avFR_' + fid)
            if (row) row.className = 'av-file-row error'
            toast('Error leyendo archivo', 'er')
          }
        }
      }

      const uploadNewTicketFiles = async (files) => {
        if (!files || !files.length || !S.form.draftTicketId) return
        const st = $('nFileStatus')
        if (st)
          st.textContent =
            'Subiendo ' +
            files.length +
            ' archivo' +
            (files.length > 1 ? 's' : '') +
            '...'
        for (const file of Array.from(files)) {
          try {
            const b64 = await toB64(file)
            await new Promise((res) =>
              api.upload(
                b64,
                file.name,
                file.type,
                S.form.draftTicketId,
                '__ticket_inicial__',
                (r) => {
                  if (r && r.success && r.file) S.form.uploadedFiles.push(r.file)
                  res()
                }
              )
            )
          } catch (e) {}
        }
        if (st) st.textContent = ''
        R()
      }

      const uploadQuickFile = async (files, ticket, isVid = false) => {
        if (!files || !files.length || !ticket) return
        for (const file of Array.from(files)) {
          try {
            const b64 = await toB64(file)
            let dur = null
            if (isVid) {
              try {
                dur = await getVideoDuration(file)
              } catch (e) {}
            }
            api.upload(
              b64,
              file.name,
              file.type,
              ticket.Ticket_ID,
              '',
              (r) => {
                if (r && r.success) {
                  if (!S.files[ticket.Ticket_ID]) S.files[ticket.Ticket_ID] = []
                  if (r.file) S.files[ticket.Ticket_ID].push(r.file)
                  rp()
                  toast('Archivo subido', 'ok')
                  api.hist(ticket.Ticket_ID, (hr) => {
                    if (hr && hr.success) {
                      S.hist[ticket.Ticket_ID] = hr.historial
                      rp()
                    }
                  })
                } else toast('Error subiendo archivo', 'er')
              },
              dur
            )
          } catch (e) {
            toast('Error leyendo archivo', 'er')
          }
        }
      }

      const getVideoDuration = (file) =>
        new Promise((res, rej) => {
          const v = document.createElement('video')
          v.preload = 'metadata'
          const u = URL.createObjectURL(file)
          v.onloadedmetadata = () => {
            URL.revokeObjectURL(u)
            res(Math.round(v.duration))
          }
          v.onerror = rej
          v.src = u
        })

      const saveAvance = async (release = false) => {
        if (!S.sel) return
        const t = S.sel
        const fecha =
          ($('avFecha') || {}).value || new Date().toISOString().split('T')[0]
        const tec = ($('avTec') || {}).value || t.Tecnico || ''
        const ot = ($('avOT') || {}).value || t.OT_Numero || ''
        const resumen = ($('avResumen') || {}).value || ''
        const notas = ($('avNotas') || {}).value || ''
        if (!resumen.trim()) {
          toast('Escribe el resumen del avance', 'er')
          return
        }
        const st = $('avStatus')
        if (st) st.innerHTML = '<span class="spin"></span> Guardando...'
        const fileRefs = S.avanceFiles.map((f) => f.name)
        api.saveAvance(
          t.Ticket_ID,
          {
            fechaAvance: fecha,
            tecnico: tec,
            ot,
            resumen: resumen.trim(),
            notas: notas.trim(),
            archivos: fileRefs,
            avanceId: S.newAvanceId || '',
            fileIds: S.avanceFiles.map((f) => f.id),
          },
          (r) => {
            if (r && r.success) {
              if (tec && tec !== t.Tecnico) {
                Object.assign(S.sel, { Tecnico: tec })
                const tf = S.tickets.find((x) => x.Ticket_ID === t.Ticket_ID)
                if (tf) tf.Tecnico = tec
              }
              S.newAvanceOpen = false
              S.avanceFiles = []
              S.newAvanceId = null
              if (release) {
                api.update(
                  t.Ticket_ID,
                  { Estado: 'Esperando aprobacion' },
                  S.user,
                  () => {
                    api.hist(t.Ticket_ID, (rr) => {
                      if (rr && rr.success) {
                        S.hist[t.Ticket_ID] = rr.historial || []
                        const grp = groupAvances(S.hist[t.Ticket_ID])
                        S.items[t.Ticket_ID] = grp.items
                        S.adminNotes[t.Ticket_ID] = grp.adminNotes
                      }
                      rp()
                    })
                  }
                )
                toast('Avance guardado y turno finalizado', 'ok')
              } else {
                api.hist(t.Ticket_ID, (rr) => {
                  if (rr && rr.success) {
                    S.hist[t.Ticket_ID] = rr.historial || []
                    const grp = groupAvances(S.hist[t.Ticket_ID])
                    S.items[t.Ticket_ID] = grp.items
                    S.adminNotes[t.Ticket_ID] = grp.adminNotes
                    if (t.Carpeta_Drive) {
                      api.folderFiles(t.Carpeta_Drive, (fr) => {
                        S.files[t.Ticket_ID] = fr.files || []
                        rp()
                      })
                    } else rp()
                  }
                })
                toast('Avance guardado', 'ok')
              }
            } else {
              if (st) st.textContent = 'Error al guardar'
              toast((r && r.error) || 'Error al guardar avance', 'er')
            }
          }
        )
      }

      /* ═══ INIT ═══ */
      const init = () => {
        applyDark()
        const saved = getSaved()
        if (saved.u && saved.token) {
          lp.start()
          api.checkSession(saved.token, (r) => {
            if (r && r.success) {
              S.sessionToken = saved.token
              S.user = r.user
              S.role = r.role
              S.uname = r.name
              S.view = S.role === 'tecnico' ? 'tickets' : 'dashboard'
              const cached = cache.load(S.user)
              if (cached) {
                S.tickets = cached
                S._dataLoaded = true
                R()
              } else {
                S._dataLoaded = false
                R()
              }
              api.initData((cfg) => {
                if (!cfg || !cfg.success)
                  S.cfg = {
                    urgencias: D_URG,
                    estados: D_EST,
                    categorias: D_CAT,
                    tecnicos: D_TEC,
                    sucursales: [],
                  }
                api.tickets(S.role, S.user, (ts) => {
                  if (ts && ts.success) {
                    S.tickets = ts.tickets
                    cache.save(S.user, ts.tickets)
                  }
                  S._dataLoaded = true
                  lp.done()
                  R()
                })
              })
            } else {
              try {
                localStorage.removeItem('jb_auth')
              } catch (e) {}
              lp.done()
              R()
            }
          })
        } else R()
      }
      init()
    </script>
  </body>
</html>
