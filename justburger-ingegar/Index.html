      /* ═══ REPORTES ERP v2.1 ═══ */
      const reportView = () => {
        if (
          !S.repFilter ||
          !S.repFilter.est ||
          typeof S.repFilter.est.has !== 'function'
        ) {
          const old = S.repFilter || {}
          S.repFilter = {
            desde: old.desde || '',
            hasta: old.hasta || '',
            preset: old.preset || '',
            est: new Set(Array.isArray(old.est) ? old.est : []),
            urg: new Set(Array.isArray(old.urg) ? old.urg : []),
            suc: new Set(Array.isArray(old.suc) ? old.suc : []),
            tec: new Set(Array.isArray(old.tec) ? old.tec : []),
          }
        }
        const F = S.repFilter
        /* Aplicar presets de periodo */
        const now = new Date()
        /* F02: presets con fecha local Chile, no UTC */
        if (F.preset) {
          const todayStr = localToday()
          if (F.preset === 'today') {
            F.desde = todayStr
            F.hasta = todayStr
          } else if (F.preset === 'yesterday') {
            const y = new Date()
            y.setDate(y.getDate() - 1)
            const yStr =
              y.getFullYear() +
              '-' +
              String(y.getMonth() + 1).padStart(2, '0') +
              '-' +
              String(y.getDate()).padStart(2, '0')
            F.desde = yStr
            F.hasta = yStr
          } else {
            const d2 = new Date()
            const dias = { week: 7, month: 30, quarter: 90, year: 365 }[F.preset] || 30
            d2.setDate(d2.getDate() - dias)
            F.desde =
              d2.getFullYear() +
              '-' +
              String(d2.getMonth() + 1).padStart(2, '0') +
              '-' +
              String(d2.getDate()).padStart(2, '0')
            F.hasta = todayStr
          }
        }
        let arr = Array.isArray(S.tickets) ? [...S.tickets] : []
        if (F.desde) {
          arr = arr.filter((t) => getDatePart(t.Fecha_Creacion) >= F.desde)
        } /* string compare YYYY-MM-DD */
        if (F.hasta) {
          arr = arr.filter((t) => getDatePart(t.Fecha_Creacion) <= F.hasta)
        }
        if (F.est.size) arr = arr.filter((t) => F.est.has(t.Estado))
        if (F.urg.size) arr = arr.filter((t) => F.urg.has(t.Urgencia))
        if (F.suc.size) arr = arr.filter((t) => F.suc.has(t.Sucursal))
        if (F.tec.size) arr = arr.filter((t) => F.tec.has(t.Tecnico || '(sin asignar)'))
        const T = arr,
          total = T.length
        const open = T.filter(
          (t) => !['Resuelto', 'Cancelado'].includes(t.Estado)
        ).length
        const resueltos = T.filter((t) => t.Estado === 'Resuelto').length
        const vencidos = T.filter(
          (t) =>
            t.Fecha_Estimada &&
            days(t.Fecha_Estimada) < 0 &&
            !['Resuelto', 'Cancelado'].includes(t.Estado)
        ).length
        const tasaRes = total ? Math.round((resueltos / total) * 100) : 0
        const resueltosCon = T.filter(
          (t) => t.Estado === 'Resuelto' && t.Fecha_Creacion && t.Fecha_Cierre
        )
        const mtr = resueltosCon.length
          ? Math.round(
              (resueltosCon.reduce((sum, t) => {
                try {
                  const d =
                    (new Date(t.Fecha_Cierre) -
                      new Date(t.Fecha_Creacion.replace(' ', 'T'))) /
                    86400000
                  return sum + (d > 0 ? d : 0)
                } catch {
                  return sum
                }
              }, 0) /
                resueltosCon.length) *
                10
            ) / 10
          : null
        const conFecha = T.filter(
          (t) => t.Estado === 'Resuelto' && t.Fecha_Estimada && t.Fecha_Cierre
        )
        const slaOk = conFecha.filter((t) => {
          try {
            return new Date(t.Fecha_Cierre) <= new Date(t.Fecha_Estimada + 'T23:59:59')
          } catch {
            return false
          }
        }).length
        const slaPct2 = conFecha.length
          ? Math.round((slaOk / conFecha.length) * 100)
          : null
        const byEst = {},
          byCat = {},
          bySuc = {},
          byTec = {},
          byUrg = {}
        D_EST.forEach((e) => (byEst[e] = 0))
        T.forEach((t) => {
          if (byEst[t.Estado] !== undefined) byEst[t.Estado]++
          const cat = t.Categoria || '(sin)'
          byCat[cat] = (byCat[cat] || 0) + 1
          const suc = String(t.Sucursal || '(sin)').replace('Tienda ', '')
          bySuc[suc] = (bySuc[suc] || 0) + 1
          const tec = t.Tecnico || '(sin asignar)'
          byTec[tec] = (byTec[tec] || 0) + 1
          const urg = t.Urgencia || '(sin)'
          byUrg[urg] = (byUrg[urg] || 0) + 1
        })
        const tecList = Array.from(
          new Set([
            ...(S.cfg.tecnicos || D_TEC).map((x) =>
              typeof x === 'string' ? x : x.nombre
            ),
            ...S.tickets.map((t) => t.Tecnico).filter(Boolean),
          ])
        ).sort()
        tecList.push('(sin asignar)')
        const msBtnR = (id, label, options, selectedSet) => {
          const n = selectedSet.size
          return (
            '<div class="ms-wrap"><button class="ms-btn ' +
            (n ? 'has-sel' : '') +
            '" data-rms-open="' +
            id +
            '"><span>' +
            label +
            '</span>' +
            (n ? '<span class="ms-btn-c">' + n + '</span>' : '') +
            '<span class="ms-arrow">&#9660;</span></button><div class="ms-pop" id="rmsp_' +
            id +
            '">' +
            options
              .map(
                (o) =>
                  '<label class="ms-opt"><input type="checkbox" data-rms-toggle="' +
                  id +
                  '" data-rms-val="' +
                  encodeURIComponent(o) +
                  '" ' +
                  (selectedSet.has(o) ? 'checked' : '') +
                  '><span>' +
                  (label === 'Sucursales' ? String(o).replace('Tienda ', '') : o) +
                  '</span></label>'
              )
              .join('') +
            '<div class="ms-actions"><button data-rms-all="' +
            id +
            '">Todos</button><button data-rms-none="' +
            id +
            '">Ninguno</button></div></div></div>'
          )
        }

        let h = '<div>'
        h +=
          '<div class="rep-strip"><div><div class="rep-strip-title">&#9965; Reportes &amp; Analitica</div><div class="rep-strip-sub">' +
          total +
          ' tickets en filtro &middot; ' +
          S.tickets.length +
          ' total sistema</div></div><div class="rep-strip-btns"><button class="rep-strip-btn" id="repPrint">&#128424; Imprimir</button><button class="rep-strip-btn" id="repCsv">&#128190; CSV</button></div></div>'
        /* Presets */
        h += '<div class="rep-preset-bar">'
        ;[
          ['', 'Todo'],
          ['yesterday', 'Ayer'],
          ['today', 'Hoy'],
          ['week', '7 días'],
          ['month', '30 días'],
          ['quarter', '90 días'],
          ['year', '1 año'],
        ].forEach(([p, l]) => {
          h +=
            '<button class="rep-preset ' +
            (F.preset === p ? 'on' : '') +
            '" data-rep-preset="' +
            p +
            '">' +
            l +
            '</button>'
        })
        h += '</div>'
        /* Filtros */
        h +=
          '<div class="rep-filters"><div style="display:flex;flex-direction:column;gap:3px"><label class="fl">Desde</label><input id="repFD" type="date" class="fi" style="min-width:130px" value="' +
          (F.desde || '') +
          '"></div><div style="display:flex;flex-direction:column;gap:3px"><label class="fl">Hasta</label><input id="repFH" type="date" class="fi" style="min-width:130px" value="' +
          (F.hasta || '') +
          '"></div><div style="align-self:flex-end">' +
          msBtnR('est', 'Estados', S.cfg.estados || D_EST, F.est) +
          '</div><div style="align-self:flex-end">' +
          msBtnR('urg', 'Urgencias', S.cfg.urgencias || D_URG, F.urg) +
          '</div><div style="align-self:flex-end">' +
          msBtnR('suc', 'Sucursales', S.cfg.sucursales || D_SUC, F.suc) +
          '</div>' +
          (S.role === 'admin'
            ? '<div style="align-self:flex-end">' +
              msBtnR('tec', 'Tecnicos', tecList, F.tec) +
              '</div>'
            : '') +
          '<button class="btn btn-g btn-sm" id="repClear" style="align-self:flex-end">&#x2715; Limpiar</button></div>'
        if (!total) {
          h +=
            '<div class="card"><div class="empty"><div class="et">Sin tickets en el filtro</div></div></div></div>'
          return h
        }
        /* KPIs ERP 6 columnas */
        const kc = (v, w, b, inv = false) => {
          if (inv) {
            return v <= w ? 'var(--gd)' : v <= b ? 'var(--amd)' : 'var(--rbd)'
          }
          return v >= w ? 'var(--gd)' : v >= b ? 'var(--amd)' : 'var(--rbd)'
        }
        h += '<div class="rep-kpi-row">'
        h +=
          '<div class="rep-kpi"><div class="rep-kpi-val" style="color:var(--acc)">' +
          total +
          '</div><div class="rep-kpi-lbl">Total tickets</div><div class="rep-kpi-trend flat">sistema: ' +
          S.tickets.length +
          '</div></div>'
        h +=
          '<div class="rep-kpi"><div class="rep-kpi-val" style="color:' +
          kc(open, 0, 5, true) +
          '">' +
          open +
          '</div><div class="rep-kpi-lbl">Abiertos</div><div class="rep-kpi-trend ' +
          (open === 0 ? 'up' : open <= 5 ? 'flat' : 'down') +
          '">' +
          (total ? Math.round((open / total) * 100) : 0) +
          '% del total</div></div>'
        h +=
          '<div class="rep-kpi"><div class="rep-kpi-val" style="color:' +
          kc(tasaRes, 70, 50) +
          '">' +
          tasaRes +
          '%</div><div class="rep-kpi-lbl">Tasa resolucion</div><div class="rep-kpi-trend ' +
          (tasaRes >= 70 ? 'up' : tasaRes >= 50 ? 'flat' : 'down') +
          '">' +
          resueltos +
          ' resueltos</div></div>'
        h +=
          '<div class="rep-kpi"><div class="rep-kpi-val" style="color:' +
          (mtr === null
            ? 'var(--t3)'
            : mtr <= 3
              ? 'var(--gd)'
              : mtr <= 7
                ? 'var(--amd)'
                : 'var(--rbd)') +
          '">' +
          (mtr === null ? 'N/A' : mtr + 'd') +
          '</div><div class="rep-kpi-lbl">Tiempo Medio Resolucion</div><div class="rep-kpi-trend ' +
          (mtr === null ? 'flat' : mtr <= 3 ? 'up' : mtr <= 7 ? 'flat' : 'down') +
          '">' +
          (resueltosCon.length ? resueltosCon.length + ' medidos' : 'sin datos') +
          '</div></div>'
        h +=
          '<div class="rep-kpi"><div class="rep-kpi-val" style="color:' +
          (slaPct2 === null
            ? 'var(--t3)'
            : slaPct2 >= 80
              ? 'var(--gd)'
              : slaPct2 >= 60
                ? 'var(--amd)'
                : 'var(--rbd)') +
          '">' +
          (slaPct2 === null ? 'N/A' : slaPct2 + '%') +
          '</div><div class="rep-kpi-lbl">Cumplimiento SLA</div><div class="rep-kpi-trend ' +
          (slaPct2 === null
            ? 'flat'
            : slaPct2 >= 80
              ? 'up'
              : slaPct2 >= 60
                ? 'flat'
                : 'down') +
          '">' +
          (conFecha.length ? conFecha.length + ' medidos' : 'sin datos') +
          '</div></div>'
        h +=
          '<div class="rep-kpi"><div class="rep-kpi-val" style="color:' +
          (vencidos === 0 ? 'var(--gd)' : vencidos <= 3 ? 'var(--amd)' : 'var(--rbd)') +
          '">' +
          vencidos +
          '</div><div class="rep-kpi-lbl">Fuera de plazo</div><div class="rep-kpi-trend ' +
          (vencidos === 0 ? 'up' : vencidos <= 3 ? 'flat' : 'down') +
          '">' +
          (vencidos === 0 ? 'al dia' : 'requiere atencion') +
          '</div></div>'
        h += '</div>'
        /* Charts distribucion */
        const distBar = (data, colorFn) => {
          const max = Math.max(1, ...Object.values(data))
          return Object.entries(data)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8)
            .map(
              ([k, n]) =>
                '<div class="rep-bar-row"><div class="rep-bar-lbl" title="' +
                k +
                '">' +
                k +
                '</div><div class="rep-bar-track"><div class="rep-bar-fill" style="width:' +
                Math.round((n / max) * 100) +
                '%;background:' +
                (typeof colorFn === 'function' ? colorFn(k) : colorFn) +
                '"></div></div><div class="rep-bar-val">' +
                n +
                '</div></div>'
            )
            .join('')
        }
        const estColorMap = {
          Nuevo: '#6B7280',
          'En revision': '#2563EB',
          'En ejecucion': '#D97706',
          Resuelto: '#16a34a',
          Cancelado: '#9CA3AF',
          Bloqueado: '#DC2626',
          'Esperando aprobacion': '#7C3AED',
          Fusionado: '#0891B2',
        }
        h +=
          '<div class="rep-2col"><div class="rep-card"><div class="rep-card-title">Por estado</div>' +
          distBar(byEst, (s) => estColorMap[s] || 'var(--t3)') +
          '</div><div class="rep-card"><div class="rep-card-title">Por urgencia</div>' +
          distBar(byUrg, (u) => urgColor(u)) +
          '</div></div>'
        h +=
          '<div class="rep-2col"><div class="rep-card"><div class="rep-card-title">Por categoria</div>' +
          distBar(byCat, 'var(--pud)') +
          '</div><div class="rep-card"><div class="rep-card-title">Por sucursal</div>' +
          distBar(bySuc, 'var(--bld)') +
          '</div></div>'
        /* Tabla tecnico (solo admin) */
        if (S.role === 'admin' && Object.keys(byTec).length) {
          const tecData = Object.entries(byTec).sort((a, b) => b[1] - a[1])
          const maxTec = Math.max(1, ...tecData.map(([, n]) => n))
          h +=
            '<div class="rep-card" style="margin-bottom:14px"><div class="rep-card-title">Rendimiento por tecnico</div><div style="overflow-x:auto"><table class="rep-tec-table"><thead><tr><th>Tecnico</th><th>Total</th><th>Resueltos</th><th>Tasa</th><th style="min-width:120px">Volumen</th></tr></thead><tbody>'
          tecData.forEach(([nm, tot]) => {
            const res = T.filter(
              (t) => (t.Tecnico || '(sin asignar)') === nm && t.Estado === 'Resuelto'
            ).length
            const tasa = tot ? Math.round((res / tot) * 100) : 0
            const pct = Math.round((tot / maxTec) * 100)
            h +=
              '<tr><td style="font-weight:600">' +
              nm +
              '</td><td>' +
              tot +
              '</td><td>' +
              res +
              '</td><td><span style="font-weight:700;color:' +
              (tasa >= 70 ? 'var(--gd)' : tasa >= 50 ? 'var(--amd)' : 'var(--rbd)') +
              '">' +
              tasa +
              '%</span></td><td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden"><div style="width:' +
              pct +
              '%;height:100%;background:var(--bld);border-radius:3px"></div></div><span style="font-size:10px;color:var(--t3)">' +
              pct +
              '%</span></div></td></tr>'
          })
          h += '</tbody></table></div></div>'
        }
        return h + '</div>'
      }

      /* ═══ PANEL ═══ */
      const chatBarHTML = (t) => {
        if (!t) return ''
        const canChat =
          S.role === 'admin' || S.role === 'cliente' || S.role === 'tecnico'
        if (!canChat || S.tab !== 'hist') return ''
        return (
          '<div class="chat-bar chat-bar-wrap" id="pChatBar">' +
          (S.chatMenuOpen ? _chatMenuHTML() : '') +
          '<button class="chat-plus ' +
          (S.chatMenuOpen ? 'on' : '') +
          '" id="chatPlus" title="Mas opciones">+</button>' +
          '<textarea class="chat-textbox" id="chatInput" placeholder="Escribe un comentario..." rows="1">' +
          (S.chatInput || '') +
          '</textarea>' +
          '<button class="chat-send" id="chatSend" ' +
          (!(S.chatInput || '').trim() ? 'disabled' : '') +
          ' title="Enviar">&#10148;</button>' +
          '</div>'
        )
      }

      const panelHTML = () => {
        const t = S.sel
        if (!t) return ''
        const hh = S.hist[t.Ticket_ID] || []
        const grp = groupAvances(hh)
        const filesArr = S.files[t.Ticket_ID] || []
        const avC = grp.avances.length
        const fC = filesArr.length
        const s = sla(t)
        const pct = slaPct(t)
        const tabContent =
          S.tab === 'info' ? piHTML(t) : S.tab === 'hist' ? phHTML(t) : pdHTML(t)
        return (
          '<div class="overlay" id="overlay"><div class="panel" id="panel">' +
          '<div class="ph2"><div class="ph2r"><div style="min-width:0">' +
          '<div class="pid">' +
          t.Ticket_ID +
          '</div>' +
          '<div class="ptit">' +
          t.Titulo +
          '</div>' +
          '<div class="psuc">' +
          (t.Sucursal || '').replace('Tienda ', '') +
          '</div>' +
          '</div><button class="px" id="pClose">&times;</button></div>' +
          '<div class="ptg">' +
          BU(t.Urgencia) +
          BE(t.Estado) +
          '<span class="sla ' +
          s.c +
          '">' +
          s.l +
          '</span></div>' +
          (pct !== null
            ? '<div class="ppr"><div class="pprl">SLA &middot; ' +
              pct +
              '%</div><div class="pprt"><div class="pprf" style="width:' +
              pct +
              '%;background:' +
              (pct >= 100 ? 'var(--rbd)' : pct >= 75 ? 'var(--amd)' : 'var(--gd)') +
              '"></div></div></div>'
            : '') +
          '</div>' +
          '<div class="ptabs">' +
          '<button class="ptb ' +
          (S.tab === 'info' ? 'on' : '') +
          '" data-tab="info">Detalle</button>' +
          '<button class="ptb ' +
          (S.tab === 'hist' ? 'on' : '') +
          '" data-tab="hist">Trabajo' +
          (avC ? ' <span class="ptb-count">' + avC + '</span>' : '') +
          '</button>' +
          '<button class="ptb ' +
          (S.tab === 'docs' ? 'on' : '') +
          '" data-tab="docs">Documentos' +
          (fC ? ' <span class="ptb-count">' + fC + '</span>' : '') +
          '</button>' +
          '</div>' +
          '<div class="pbody" id="pBody">' +
          tabContent +
          '</div>' +
          chatBarHTML(t) + // chat bar FUERA del pbody → no se corta por overflow
          '</div></div>'
        )
      }

      /* ═══ TAB DETALLE ═══ */
      const piHTML = (t) => {
        const tid = t.Ticket_ID
        // Items: undefined = cargando | [] = vacío | [...] = cargado
        const itemsLoading = S.items[tid] === undefined
        const itemsArr = itemsLoading ? [] : (S.items[tid] || []).slice()
        const s = sla(t)
        let h = ''

        /* ── Origen / fusión ── */
        const isMerged = t.Source_Type === 'merge'
        let mergedSources = []
        if (isMerged && t.Source_Note) {
          let parsed = null
          try {
            parsed = JSON.parse(t.Source_Note)
          } catch (e) {}
          if (parsed && parsed.merged_from && Array.isArray(parsed.merged_from))
            mergedSources = parsed.merged_from
          else {
            const matches = String(t.Source_Note).match(/[0-9A-Za-z._-]{10,}/g) || []
            mergedSources = matches.map((id) => ({
              id,
              fecha: '',
              urgencia: '',
              titulo: '',
            }))
            mergedSources.forEach((src) => {
              const found = S.tickets.find((x) => x.Ticket_ID === src.id)
              if (found) {
                src.fecha = found.Fecha_Creacion
                src.urgencia = found.Urgencia
                src.titulo = found.Titulo
              }
            })
          }
        }
        if (isMerged) {
          const showList = S.mergedListOpen === tid
          h +=
            '<div class="src-note-box"><span class="src-badge merge">&#11052; Ticket fusionado</span><button class="btn btn-g btn-xs" id="pToggleMerged" style="margin-top:6px;width:100%;justify-content:space-between;display:flex;align-items:center"><span>' +
            (showList
              ? 'Ocultar origen'
              : 'Ver tickets origen (' + mergedSources.length + ')') +
            '</span><span>' +
            (showList ? '&#9650;' : '&#9660;') +
            '</span></button>'
          if (showList && mergedSources.length) {
            h +=
              '<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">'
            mergedSources.forEach((src, i) => {
              h +=
                '<div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;display:flex;align-items:center;gap:8px;font-size:11px"><div style="background:var(--pul);color:var(--pud);font-weight:700;font-size:10px;padding:2px 7px;border-radius:10px">' +
                (i + 1) +
                '</div><div style="flex:1;min-width:0"><div style="font-weight:600">' +
                (src.titulo || src.id) +
                '</div><div style="font-size:10px;color:var(--t3)"><span class="tid" style="font-size:9px">' +
                src.id +
                '</span>' +
                (src.fecha ? ' &middot; ' + fDs(src.fecha) : '') +
                '</div></div>' +
                (src.urgencia
                  ? '<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:' +
                    urgColor(src.urgencia) +
                    ';color:#fff">' +
                    src.urgencia +
                    '</span>'
                  : '') +
                '</div>'
            })
            h += '</div>'
          }
          h += '</div>'
        } else if (t.Source_Type && t.Source_Note) {
          const icon = t.Source_Type === 'split' ? '&#9140;' : '&#8618;'
          const label = t.Source_Type === 'split' ? 'Separado de' : 'Derivado de'
          h +=
            '<div class="src-note-box"><span class="src-badge ' +
            t.Source_Type +
            '">' +
            icon +
            ' ' +
            label +
            '</span><div style="font-size:12px;margin-top:6px">' +
            String(t.Source_Note || '') +
            '</div></div>'
        }
        if (t.Merged_Into)
          h +=
            '<div class="src-note-box"><span class="src-badge merge">Fusionado en: ' +
            t.Merged_Into +
            '</span></div>'

        /* ════════════════════════════════════════
     BLOQUE 1: ESTADO (el más importante)
     ════════════════════════════════════════ */
        h += '<div class="ps">'
        /* F07/F09: Admin = selector manual; Técnico = acciones de workflow */
        if (can.changeStatus()) {
          h +=
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span class="pst">Estado del requerimiento</span><span>' +
            BE(t.Estado) +
            '</span></div>'
          h += '<div class="stgrid">'
          ;(S.cfg.estados || D_EST)
            .filter((e) => e !== 'Fusionado')
            .forEach((e) => {
              h +=
                '<button class="stb ' +
                (t.Estado === e ? stCls(e) : '') +
                '" data-set-est="' +
                e +
                '">' +
                e +
                '</button>'
            })
          h += '</div>'
          if (s.c !== 'sd' && s.c !== 'sno')
            h +=
              '<div style="display:flex;align-items:center;gap:8px;margin-top:8px"><span class="sla ' +
              s.c +
              '">&#128197; ' +
              s.l +
              '</span>' +
              (t.Fecha_Estimada
                ? '<span style="font-size:11px;color:var(--t3)">Fecha est.: ' +
                  fD(t.Fecha_Estimada) +
                  '</span>'
                : '') +
              '</div>'
        } else if (can.workerAction()) {
          /* F09: TÉCNICO — solo workflow */
          h +=
            '<div class="pst" style="margin-bottom:8px">Estado &mdash; ' +
            BE(t.Estado) +
            '</div>'
          if (s.c !== 'sd' && s.c !== 'sno')
            h +=
              '<div style="margin-bottom:10px"><span class="sla ' +
              s.c +
              '">' +
              s.l +
              '</span>' +
              (t.Fecha_Estimada
                ? ' &middot; <span style="font-size:11px;color:var(--t3)">' +
                  fD(t.Fecha_Estimada) +
                  '</span>'
                : '') +
              '</div>'
          var techBtns = []
          if (['Nuevo', 'En revision'].includes(t.Estado))
            techBtns.push({
              est: 'En ejecucion',
              label: '&#9654; Tomar trabajo / Iniciar visita',
              cls: 'btn-p',
            })
          if (t.Estado === 'En ejecucion')
            techBtns.push({
              est: 'Esperando aprobacion',
              label: '&#10003; Trabajo terminado &mdash; enviar a revision',
              cls: 'btn-ok',
            })
          if (t.Estado === 'Bloqueado')
            techBtns.push({
              est: 'En ejecucion',
              label: '&#9655; Reanudar trabajo',
              cls: 'btn-s',
            })
          if (!techBtns.length) {
            h +=
              '<div class="ibox info" style="font-size:12px">' +
              (t.Estado === 'Esperando aprobacion'
                ? 'Trabajo enviado. Esperando aprobacion del administrador.'
                : t.Estado === 'Resuelto'
                  ? 'Ticket resuelto por el administrador.'
                  : t.Estado === 'Cancelado'
                    ? 'Ticket cancelado.'
                    : 'Sin acciones disponibles en este estado.') +
              '</div>'
          } else {
            h += '<div style="display:flex;flex-direction:column;gap:8px">'
            techBtns.forEach((btn) => {
              h +=
                '<button class="btn ' +
                btn.cls +
                '" data-set-est="' +
                btn.est +
                '" style="justify-content:center;padding:10px 14px">' +
                btn.label +
                '</button>'
            })
            h += '</div>'
          }
        } else {
          h +=
            '<div class="pst">Estado</div><div style="display:flex;align-items:center;gap:8px">' +
            BE(t.Estado) +
            '<span class="sla ' +
            s.c +
            '">' +
            s.l +
            '</span></div>'
        }
        h += '</div>'

        /* ════════════════════════════════════════
     BLOQUE 2: SUB-TAREAS / ITEMS
     ════════════════════════════════════════ */
        // Mostrar siempre si admin, o si hay items
        if (can.manageItems() || itemsLoading || itemsArr.length) {
          const pendingItems = itemsArr.filter(
            (it) => it.estado === 'pendiente' || it.estado === 'proceso'
          )
          const resolvedItems = itemsArr.filter((it) => it.estado === 'resuelto')
          const completePct = itemsArr.length
            ? Math.round((resolvedItems.length / itemsArr.length) * 100)
            : 0
          const splitMode = S.splitMode

          h += '<div class="ps items-section">'

          // Header sub-tareas
          h +=
            '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px">'
          if (itemsLoading) {
            h +=
              '<div style="font-size:12px;font-weight:700;color:var(--t3)">Sub-tareas <span class="spin" style="width:10px;height:10px;vertical-align:middle"></span></div>'
          } else {
            h +=
              '<div style="display:flex;align-items:center;gap:8px">' +
              '<span style="font-size:12px;font-weight:700">Sub-tareas</span>' +
              (itemsArr.length
                ? '<span class="b ' +
                  (pendingItems.length ? 'se' : 'sre') +
                  '" style="font-size:10px">' +
                  resolvedItems.length +
                  '/' +
                  itemsArr.length +
                  ' resueltas</span>'
                : '') +
              '</div>'
          }
          if (can.admin() && itemsArr.length > 1)
            h +=
              '<button class="btn btn-g btn-xs" id="pSplitToggle">' +
              (splitMode ? '&#x2715; Cancelar separacion' : '&#9140; Separar items') +
              '</button>'
          h += '</div>'

          // Barra de progreso
          if (itemsArr.length > 0) {
            h +=
              '<div style="height:6px;background:var(--bd);border-radius:3px;overflow:hidden;margin-bottom:10px">' +
              '<div style="height:100%;width:' +
              completePct +
              '%;background:var(--gd);border-radius:3px;transition:width .4s"></div></div>'
          }

          if (itemsLoading) {
            // Skeleton loading
            h += '<div style="display:flex;flex-direction:column;gap:7px">'
            for (let i = 0; i < 3; i++)
              h +=
                '<div style="height:46px;background:var(--bg2);border-radius:var(--r);animation:shimmer 1.4s linear infinite;background:linear-gradient(90deg,var(--bg2) 0%,var(--s2) 50%,var(--bg2) 100%);background-size:200% 100%"></div>'
            h += '</div>'
          } else if (!itemsArr.length) {
            if (can.manageItems()) {
              h +=
                '<div class="item-empty">Sin sub-tareas. Usa el boton de abajo para agregar trabajos especificos.</div>'
            } else {
              h += '<div class="item-empty">Sin sub-tareas registradas aun.</div>'
            }
          } else {
            if (splitMode)
              h +=
                '<div class="ibox info" style="margin-bottom:8px">Marca los items que quieres mover a un nuevo ticket separado.</div>'
            h += '<div class="items-grid">'
            itemsArr.forEach((it, idx) => {
              const done = it.estado === 'resuelto'
              const moved = it.estado === 'movido'
              const isSplitSel = S.splitItemIds.has(it.id)
              const isExpanded = S.expandedItemId === it.id
              const stColor = done ? 'var(--gd)' : moved ? 'var(--t4)' : 'var(--amd)'
              const stBg = done ? 'var(--gl)' : moved ? 'var(--s2)' : 'var(--aml)'
              const stBd = done ? 'var(--gb)' : moved ? 'var(--bd)' : 'var(--amb)'
              const stIcon = done ? '&#10003;' : moved ? '&#8618;' : '&#9711;'
              h +=
                '<div class="item-card' +
                (done ? ' resolved' : '') +
                (moved ? ' movido' : '') +
                '">'
              h +=
                '<div style="display:flex;align-items:flex-start;gap:9px;width:100%;cursor:' +
                (moved ? 'default' : 'pointer') +
                '" ' +
                (!moved && !splitMode ? 'data-item-row="' + it.id + '"' : '') +
                ' >'
              if (splitMode && !done && !moved)
                h +=
                  '<input type="checkbox" class="item-split-check" data-split-iid="' +
                  it.id +
                  '" ' +
                  (isSplitSel ? 'checked' : '') +
                  ' onclick="event.stopPropagation()">'
              h +=
                '<div style="min-width:20px;padding-top:2px;text-align:center"><span style="font-size:9px;font-weight:700;color:var(--t4)">' +
                (idx + 1) +
                '</span></div>'
              h +=
                '<div class="item-body" style="flex:1;min-width:0">' +
                '<div class="item-title ' +
                (done ? 'done' : '') +
                '" style="font-weight:600">' +
                it.titulo +
                '</div>' +
                (it.descripcion
                  ? '<div class="item-desc">' + it.descripcion + '</div>'
                  : '') +
                '<div style="display:inline-flex;align-items:center;gap:4px;margin-top:5px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:' +
                stBg +
                ';color:' +
                stColor +
                ';border:1px solid ' +
                stBd +
                '">' +
                stIcon +
                ' ' +
                (done ? 'Resuelto' : moved ? 'Movido' : 'Pendiente') +
                '</div>' +
                (it.source_ticket_id
                  ? '<div style="font-size:9px;color:var(--t4);margin-top:2px">&#9756; origen: ' +
                    it.source_ticket_id.substring(0, 20) +
                    '</div>'
                  : '') +
                '</div>'
              if (!moved && !splitMode)
                h +=
                  '<div style="font-size:10px;color:var(--t4);padding-top:2px">' +
                  (isExpanded ? '&#9650;' : '&#9660;') +
                  '</div>'
              h += '</div>'
              // Acciones expandidas
              if (isExpanded && !moved && can.manageItems()) {
                h +=
                  '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:6px;align-items:center">'
                if (!done)
                  h +=
                    '<button class="btn btn-ok btn-xs" data-item-set="' +
                    it.id +
                    '|resuelto">&#10003; Marcar resuelta</button>'
                else
                  h +=
                    '<button class="btn btn-g btn-xs" data-item-set="' +
                    it.id +
                    '|pendiente">&#9711; Volver a pendiente</button>'
                h +=
                  '<button class="btn btn-g btn-xs" data-item-edit="' +
                  it.id +
                  '">&#9998; Editar</button>'
                h +=
                  '<button class="btn btn-g btn-xs" data-item-del="' +
                  it.id +
                  '" style="color:var(--rbd);margin-left:auto">&#128465; Eliminar</button>'
                h += '</div>'
              }
              h += '</div>'
            })
            h += '</div>'
            if (splitMode && S.splitItemIds.size > 0)
              h +=
                '<button class="btn btn-p btn-sm" id="pSplitConfirm" style="margin-top:8px">&#9140; Separar ' +
                S.splitItemIds.size +
                ' item' +
                (S.splitItemIds.size > 1 ? 's' : '') +
                ' a nuevo ticket</button>'
          }
          if (can.manageItems())
            h +=
              '<button class="btn btn-s btn-sm" id="pAddItem" style="margin-top:10px">+ Agregar sub-tarea</button>'
          h += '</div>'
        }

        /* ════════════════════════════════════════
     BLOQUE 3: DESCRIPCION
     ════════════════════════════════════════ */
        if (!isMerged) {
          h +=
            '<div class="ps"><div class="pst">Descripcion del problema</div>' +
            '<div class="dbox">' +
            (t.Descripcion ||
              '<em style="color:var(--t4)">Sin descripcion registrada</em>') +
            '</div>' +
            (can.edit()
              ? '<button class="btn btn-g btn-xs" id="pEditDesc" style="margin-top:6px">&#9998; Editar</button>'
              : '') +
            '</div>'
        }

        /* ════════════════════════════════════════
     BLOQUE 4: DATOS DEL REQUERIMIENTO
     ════════════════════════════════════════ */
        h += '<div class="ps"><div class="pst">Informacion</div>'
        const infoRows = [
          ['Ticket ID', '<span class="tid">' + t.Ticket_ID + '</span>'],
          ['Sucursal', t.Sucursal || '&mdash;'],
          ['Categoria', t.Categoria || '&mdash;'],
          ['Urgencia', BU(t.Urgencia)],
          ['Creado por', t.Creado_Por || '&mdash;'],
          [
            'Fecha apertura',
            fDT(t.Fecha_Creacion) +
              (can.admin()
                ? ' <button class="btn btn-g" data-edit-fecha="' +
                  t.Ticket_ID +
                  '" style="padding:1px 5px;font-size:9px;line-height:1" title="Corregir fecha">&#9998;</button>'
                : ''),
          ],
          ['Fecha cierre', t.Fecha_Cierre ? fDT(t.Fecha_Cierre) : '&mdash;'],
        ]
        infoRows.forEach(
          ([k, v]) =>
            (h +=
              '<div class="pr"><span class="pk">' +
              k +
              '</span><span class="pv">' +
              v +
              '</span></div>')
        )
        h += '</div>'

        /* ════════════════════════════════════════
     BLOQUE 5: EJECUCION (tecnico, OT, fecha)
     ════════════════════════════════════════ */
        const _needsSetup = _needsSetupCheck(t)
        if (can.admin() || t.Tecnico || t.OT_Numero) {
          h +=
            '<div class="ps"><div class="pst" style="display:flex;align-items:center;justify-content:space-between">' +
            '<span>Ejecucion</span>' +
            (can.admin()
              ? '<button class="btn btn-s btn-xs" id="pEditSetup">' +
                (t.Tecnico ? '&#9998; Editar' : '+ Asignar tecnico') +
                '</button>'
              : '') +
            '</div>'
          if (_needsSetup && can.admin())
            h +=
              '<div class="ibox warn" style="margin-bottom:8px">Sin tecnico ni OT asignados. El requerimiento no puede avanzar sin asignacion.</div>'
          h +=
            '<div class="pr"><span class="pk">Tecnico</span>' +
            '<span class="pv">' +
            (t.Tecnico
              ? '<strong>' + t.Tecnico + '</strong>'
              : '<em style="color:var(--t4)">No asignado</em>') +
            '</span></div>'
          if (can.admin()) {
            h +=
              '<div class="pr"><span class="pk">OT Numero</span>' +
              '<span class="pv" style="display:flex;align-items:center;gap:6px">' +
              '<span style="flex:1">' +
              (t.OT_Numero || '<em style="color:var(--t4)">&mdash;</em>') +
              '</span>' +
              '<button class="btn btn-g btn-xs" id="pQuickOT">&#9998;</button>' +
              '</span></div>'
          } else {
            h +=
              '<div class="pr"><span class="pk">OT</span><span class="pv">' +
              (t.OT_Numero || '&mdash;') +
              '</span></div>'
          }
          if (t.Carpeta_Drive)
            h +=
              '<div class="pr"><span class="pk">Carpeta Drive</span><span class="pv"><a href="' +
              t.Carpeta_Drive +
              '" target="_blank">&#128193; Abrir &rarr;</a></span></div>'
          h += '</div>'
        }

        /* ════════════════════════════════════════
     BLOQUE 6: DOCUMENTOS INICIALES (thumbs)
     ════════════════════════════════════════ */
        const allFiles = S.files[tid] || []
        const hist = S.hist[tid] || []
        const inicialNames = new Set()
        hist.forEach((ev) => {
          if (String(ev.Estado_Anterior) !== '[DOC]') return
          let pid = ev.Avance_Parent_ID
          let meta = null
          try {
            meta = JSON.parse(ev.Nota || '{}')
          } catch (e) {}
          if (meta && meta.parentId) pid = meta.parentId
          if (pid === '__inicial__' || pid === '__ticket_inicial__')
            inicialNames.add(String(ev.Estado_Nuevo || ''))
        })
        const inicialFiles = allFiles.filter((f) => inicialNames.has(f.name))
        if (inicialFiles.length) {
          h +=
            '<div class="ps"><div class="pst">Documentos adjuntos (' +
            inicialFiles.length +
            ')</div>' +
            '<div style="display:flex;gap:7px;flex-wrap:wrap">'
          inicialFiles.forEach((f) => {
            const ico = fileIco(f.mimeType, f.name)
            const isImg = ico.lbl === 'IMG'
            if (isImg && f.id)
              h +=
                '<div class="doc-thumb" data-prev="' +
                f.id +
                '" style="width:76px;height:76px;border-radius:var(--r);background:#000 url(\'https://drive.google.com/thumbnail?id=' +
                f.id +
                '&sz=w200\') center/cover;border:1px solid var(--bd);cursor:pointer;flex-shrink:0" title="' +
                f.name +
                '"></div>'
            else
              h +=
                '<div class="doc-thumb" data-prev="' +
                f.id +
                '" style="width:76px;height:76px;border-radius:var(--r);background:' +
                ico.bg +
                ';color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;border:1px solid var(--bd);cursor:pointer;flex-shrink:0" title="' +
                f.name +
                '">' +
                ico.lbl +
                '</div>'
          })
          h += '</div></div>'
        }

        /* ════════════════════════════════════════
     BLOQUE 7: NOTAS INTERNAS (solo admin)
     ════════════════════════════════════════ */
        if (can.admin()) {
          const notes = (S.adminNotes && S.adminNotes[tid]) || []
          h +=
            '<div class="ps"><div class="pst" style="display:flex;align-items:center;justify-content:space-between">' +
            '<span>Notas internas</span><span style="font-size:10px;color:var(--t3);text-transform:none;letter-spacing:0">Solo admin &middot; ' +
            notes.length +
            ' nota' +
            (notes.length !== 1 ? 's' : '') +
            '</span></div>'
          if (!notes.length) h += '<div class="item-empty">Sin notas internas.</div>'
          else {
            h += '<div style="display:flex;flex-direction:column;gap:6px">'
            notes.forEach((n) => {
              h +=
                '<div style="background:var(--aml);border:1px solid var(--amb);border-radius:var(--r);padding:9px 11px">' +
                '<div style="font-size:12.5px;color:var(--amd);line-height:1.55;white-space:pre-wrap">' +
                n.texto +
                '</div>' +
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">' +
                '<div style="font-size:10px;color:var(--t4)">' +
                fDT(n.fecha) +
                ' &middot; ' +
                (n.usuario || 'sistema') +
                '</div>' +
                '<div style="display:flex;gap:4px">' +
                '<button class="btn btn-g btn-xs" data-an-edit="' +
                n.id +
                '">Editar</button>' +
                '<button class="btn btn-g btn-xs" data-an-del="' +
                n.id +
                '" style="color:var(--rbd)">&times;</button>' +
                '</div></div></div>'
            })
            h += '</div>'
          }
          h +=
            '<button class="btn btn-s btn-sm" id="pAddAdminNote" style="margin-top:8px">+ Nueva nota interna</button>'
          h += '</div>'
        }

        /* ════════════════════════════════════════
     BLOQUE 8: COMENTARIO CLIENTE
     ════════════════════════════════════════ */
        if (S.role === 'cliente') {
          h +=
            '<div class="ps"><div class="pst">Tu comentario al equipo</div>' +
            '<textarea id="pCmt" class="ta" placeholder="Escribe un comentario o actualizacion para el equipo Ingegar...">' +
            (t.Comentario_Cliente || '') +
            '</textarea>' +
            '<button class="btn btn-p btn-sm" id="pSaveCmt" style="margin-top:6px">Enviar comentario</button></div>'
        }

        /* ════════════════════════════════════════
     BLOQUE 9: ZONA PELIGROSA (solo admin)
     ════════════════════════════════════════ */
        if (can.deleteTicket()) {
          h +=
            '<div class="ps"><div class="pst" style="color:var(--rbd)">Zona peligrosa</div>' +
            '<button class="btn btn-danger btn-sm" id="pDelTicket">&#128465; Eliminar ticket permanentemente</button></div>'
        }

        return h
      }

      const _needsSetupCheck = (t) =>
        (!t.Tecnico || !String(t.Tecnico).trim()) &&
        (!t.OT_Numero || !String(t.OT_Numero).trim()) &&
        (!t.Fecha_Estimada || !String(t.Fecha_Estimada).trim())

      /* ═══ TAB TRABAJO v2.1 ═══ */
      const _avColor = (idx, total) => {
        if (total <= 1) return 'var(--acc)'
        if (idx === total - 1) return 'var(--gd)'
        if (idx === 0) return 'var(--acc)'
        return 'var(--bld)'
      }
      const isVideoMime = (mt) =>
        /^video\//i.test(String(mt || '')) ||
        /\.(mp4|mov|webm|m4v)$/i.test(String(mt || ''))
      const fileIco = (mt, nm) => {
        const ext = (nm || '').split('.').pop().toLowerCase()
        if (/^(mp4|mov|webm|m4v)$/.test(ext) || isVideoMime(mt))
          return { bg: FBGI.video, lbl: 'VID', isVideo: true }
        if (
          /(jpg|jpeg|png|gif|webp|svg)$/i.test(ext) ||
          (mt || '').startsWith('image/')
        )
          return { bg: FBGI.image, lbl: 'IMG' }
        if (ext === 'pdf' || (mt || '').includes('pdf'))
          return { bg: FBGI.pdf, lbl: 'PDF' }
        if (/^(xlsx|xls|csv)$/i.test(ext) || (mt || '').includes('spreadsheet'))
          return { bg: FBGI.sheet, lbl: 'XLS' }
        if (/^(docx?|odt|rtf)$/i.test(ext) || (mt || '').includes('document'))
          return { bg: FBGI.doc, lbl: 'DOC' }
        return { bg: FBGI.file, lbl: 'FILE' }
      }
      const chatAvatarColor = (user, role) => {
        const lo = (user || '').toLowerCase()
        if (role === 'admin' || lo.includes('admin') || lo.includes('ingegar'))
          return '#D42030'
        if (role === 'tecnico' || lo.includes('jesus') || lo.includes('perez'))
          return '#0891B2'
        if (role === 'cliente' || lo.includes('carolina')) return '#16A34A'
        let h = 0
        for (let i = 0; i < lo.length; i++) h = (h * 31 + lo.charCodeAt(i)) & 0xffffff
        return ['#D42030', '#0891B2', '#16A34A', '#7C3AED', '#D97706', '#DB2777'][
          Math.abs(h) % 6
        ]
      }

      const phHTML = (t) => {
        const hh = S.hist[t.Ticket_ID] || []
        const grp = groupAvances(hh)
        const can_add = can.addAvance()
        let h = ''
        h +=
          '<div class="av-newbar"><div class="av-newbar-info">' +
          grp.avances.length +
          ' avance' +
          (grp.avances.length !== 1 ? 's' : '') +
          ' &middot; ' +
          grp.asc.filter((e) => String(e.Estado_Anterior) === '[COM]').length +
          ' comentario' +
          (grp.asc.filter((e) => String(e.Estado_Anterior) === '[COM]').length !== 1
            ? 's'
            : '') +
          '</div><div style="display:flex;gap:6px"><button class="refresh-btn" id="phRefresh" title="Refrescar">&#x21bb;</button>' +
          (grp.systemEvents.length
            ? '<button class="btn btn-g btn-xs" id="phSysOpen">&#9881; ' +
              grp.systemEvents.length +
              '</button>'
            : '') +
          '</div></div>'
        if (S.newAvanceOpen && can_add) {
          if (!S.newAvanceId) S.newAvanceId = _uid()
          const nNum = grp.avances.length + 1
          const today = new Date().toISOString().split('T')[0]
          const tecOpts = (S.cfg.tecnicos || D_TEC)
            .map((tt) => {
              const n = typeof tt === 'string' ? tt : tt.nombre
              return (
                '<option ' + (t.Tecnico === n ? 'selected' : '') + '>' + n + '</option>'
              )
            })
            .join('')
          h +=
            '<div class="av-form" id="avForm"><div class="av-form-h"><div class="av-form-t"><span class="av-form-n">' +
            nNum +

          S.avanceFiles.forEach((f) => {
            const ico = fileIco(f.mimeType, f.name)
            h +=
              '<div class="av-file-row done" data-av-fid="' +
              f.id +
              '"><div class="av-file-ico" style="background:' +
              ico.bg +
              '">' +
              ico.lbl +
              '</div><div class="av-file-nm">' +
              f.name +

          const created = grp.asc.find((e) => String(e.Estado_Anterior) === '[CREADO]')
          if (created)
            h +=
              '<div style="text-align:center;padding:14px;color:var(--t3);font-size:12.5px;background:var(--s2);border-radius:var(--r);margin-bottom:12px"><div style="font-weight:600;color:var(--t2);margin-bottom:3px">Ticket creado</div><div>' +
              fDT(created.Fecha) +
              ' &middot; ' +
              (created.Usuario || 'sistema') +
              '</div></div>'
        }
        /* Cards de avance — v2.1: con thumbnails de imagen inline */
        grp.avances.forEach((av, idx) => {
          const e = av.av
          const meta = (() => {
            try {
              return JSON.parse(e.Nota || '{}')
            } catch {
              return {}
            }
          })()
          const ch = av.ch
          const com = ch.find((c) => String(c.Estado_Anterior) === '[COM]')
          const nota = ch.find((c) => String(c.Estado_Anterior) === '[NOTA]')
          const docs = ch.filter((c) => String(c.Estado_Anterior) === '[DOC]')
          const color = _avColor(idx, grp.avances.length)
          const fEnc = encodeURIComponent(e.Fecha)
          h +=
            '<div class="avcard" style="border-left-color:' +
            color +
            '"><div class="avcard-hdr"><div class="avcard-n" style="background:' +
            color +
            '">' +
            (idx + 1) +
            '</div><div class="avcard-info"><div class="avcard-title">Avance ' +
            (idx + 1) +
            ' &middot; ' +
            fD(meta.fechaAvance || e.Fecha) +
            '</div><div class="avcard-sub">' +
            (meta.tecnico || '<em style="color:var(--t4)">sin tecnico</em>') +
            (meta.ot ? ' &middot; OT ' + meta.ot : '') +
            ' &middot; <span style="color:var(--t4)">' +
            (e.Usuario || 'sistema') +
            '</span></div></div>' +
            (can.edit()
              ? '<div class="avcard-actions"><button class="btn btn-g btn-xs" data-edit-avance="' +
                fEnc +
                '" data-edit-tid="' +
                t.Ticket_ID +
                '">Editar</button><button class="btn btn-g btn-xs" data-del-avance="' +
                fEnc +
                '" data-del-tid="' +
                t.Ticket_ID +
                '" style="color:var(--rbd)">Eliminar</button></div>'
              : '') +
            '</div><div class="avcard-body">'
          h +=
            '<div class="avcard-lbl">Que se hizo</div>' +
            (com && com.Nota
              ? '<div class="avcard-resumen">' + com.Nota + '</div>'
              : '<div class="avcard-resumen empty">Sin resumen visible al cliente</div>')
          if (can.seeNotes() && nota && nota.Nota)
            h +=
              '<div class="avcard-notas"><div class="avcard-lbl" style="color:inherit;opacity:.8">Notas internas</div>' +
              nota.Nota +
              '</div>'
          if (docs.length) {
            h +=
              '<div class="avcard-files"><div class="avcard-lbl">Archivos (' +
              docs.length +
              ')</div><div class="avcard-files-grid">'
            docs.forEach((d) => {
              const nm = String(d.Estado_Nuevo || '')
              const fileObj = (S.files[t.Ticket_ID] || []).find((f) => f.name === nm)
              const fid = fileObj ? fileObj.id : ''
              const url = fileObj ? fileObj.url : ''
              const ico = fileIco('', nm)
              const isImg = ico.lbl === 'IMG'
              h +=
                '<div class="avcard-frow" data-prev="' +
                fid +
                '" data-url="' +
                url +
                '"><div class="avcard-fico" style="background:' +
                ico.bg +
                '">' +
                ico.lbl +
                '</div><div class="avcard-fnm">' +
                nm +
                '</div>' +
                (can.manageFiles()
                  ? '<div class="avcard-facts"><button class="btn btn-g btn-xs" data-frename="' +
                    fid +
                    '" data-fname="' +
                    encodeURIComponent(nm) +
                    '">&#9998;</button><button class="btn btn-g btn-xs" data-fdelete="' +
                    fid +
                    '" data-fname="' +
                    encodeURIComponent(nm) +
                    '" data-ftid="' +
                    t.Ticket_ID +
                    '" style="color:var(--rbd)">&times;</button></div>'
                  : '') +
                '</div>'
              if (isImg && fid)
                h +=
                  '<div style="margin:5px 0 2px;max-width:160px;border-radius:6px;overflow:hidden;cursor:pointer" data-prev="' +
                  fid +
                  '"><img src="https://drive.google.com/thumbnail?id=' +
                  fid +
                  '&sz=w300" style="width:100%;display:block" loading="lazy"></div>'
            })
            h += '</div></div>'
          }
          h += '</div></div>'
        })
        /* Chat v2.1 mejorado */
        /* Bug1 fix v2: excluir [COM] que ya aparecen como "Que se hizo" en un avance card.
     saveAdminAvance crea [AVANCE]+[COM](resumen) con el mismo avId.
     El primer [COM] hijo de cada avance es el resumen mostrado en avcard-resumen.
     Usamos identidad por referencia porque grp.asc y av.ch comparten los mismos objetos. */
        const _resumeComSet = new Set()
        grp.avances.forEach(function (av) {
          const firstCom = av.ch.find(function (c) {
            return String(c.Estado_Anterior) === '[COM]'
          })
          if (firstCom) _resumeComSet.add(firstCom) /* referencia al objeto, no copia */
        })
        const _allComments = grp.asc.filter(function (e) {
          if (String(e.Estado_Anterior) !== '[COM]') return false
          return !_resumeComSet.has(e) /* excluir los que ya son resumen de avance */
        })
        if (_allComments.length) {
          h +=
            '<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--bd)"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px">Comentarios (' +
            _allComments.length +
            ')</div><div class="chat-wrap">'
          let lastDay = ''
          _allComments.forEach(function (e) {
            /* Bug1: e es el evento directo de grp.asc */
            const fecha = String(e.Fecha || '').substring(0, 10)
            if (fecha && fecha !== lastDay) {
              h += '<div class="chat-day">' + fD(fecha) + '</div>'
              lastDay = fecha
            }
            const user = String(e.Usuario || 'sistema')
            const isMine = user.toLowerCase() === String(S.user || '').toLowerCase()
            const side = isMine ? 'right' : 'left'
            const avColor = chatAvatarColor(user, isMine ? S.role : '')
            const hora =
              String(e.Fecha || '').length >= 16
                ? String(e.Fecha).substring(11, 16)
                : ''
            h +=
              '<div class="chat-row ' +
              side +
              '"><div class="chat-av" style="background:' +
              avColor +
              '">' +
              ini(user) +
              '</div><div class="chat-col ' +
              side +
              '"><div class="chat-from">' +
              user +
              (isMine ? ' (yo)' : '') +
              '</div><div class="chat-bub ' +
              side +
              '"><div class="chat-bub-txt">' +
              (e.Nota || '') +
              '</div></div><div class="chat-meta">' +
              hora +
              (isMine
                ? ' <span style="color:var(--bld);font-size:10px">&#10003;&#10003;</span>'
                : '') +
              '</div></div></div>'
          })
          h += '</div></div>'
        }
        // La barra de chat se renderiza en panelHTML, fuera del pbody, para evitar overflow clipping
        return h
      }

      const _chatMenuHTML = () => {
        const items = [
          {
            k: 'new-avance',
            ico: '+',
            bg: '#16A34A',
            t: 'Nuevo avance',
            s: 'Registrar trabajo realizado',
          },
          {
            k: 'attach',
            ico: '&#128206;',
            bg: '#2563EB',
            t: 'Imagen / PDF / doc',
            s: 'Foto, plano, informe',
          },
          {
            k: 'attach-vid',
            ico: '&#127916;',
            bg: '#0891B2',
            t: 'Adjuntar video',
            s: 'MP4, MOV &middot; max 30s / 50MB',
          },
          {
            k: 'sys-events',
            ico: '&#9881;',
            bg: '#7C3AED',
            t: 'Eventos del sistema',
            s: 'Cambios de estado, creacion',
          },

        if (can.admin())
          items.push({

          '<div class="chat-menu">' +

                i.ico +
                '</div><div><div class="chat-menu-t">' +

      /* ═══ TAB DOCUMENTOS ═══ */
      const pdHTML = (t) => {
        const files = S.files[t.Ticket_ID] || []
        const hh = S.hist[t.Ticket_ID] || []
        const inicialNames = new Set()
        hh.forEach((e) => {
          if (String(e.Estado_Anterior) !== '[DOC]') return
          const pid = String(e.Avance_Parent_ID || '')
          if (pid === '__inicial__' || pid === '__ticket_inicial__')
            inicialNames.add(String(e.Estado_Nuevo || ''))
        })
        const iniciales = files.filter((f) => inicialNames.has(f.name))
        const trabajo = files.filter((f) => !inicialNames.has(f.name))
        let h = ''
        if (t.Carpeta_Drive)
          h +=
            '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap"><a href="' +
            t.Carpeta_Drive +
            '" target="_blank" class="btn btn-s btn-sm">Abrir carpeta Drive &rarr;</a>' +
            (files.length
              ? '<button class="btn btn-s btn-sm" id="pDlZip">Descargar ZIP</button>'
              : '') +
            '</div>'
        if (!files.length)
          return h + '<div class="empty"><div class="et">Sin archivos</div></div>'
        const renderGroup = (label, arr, tagColor) => {
          if (!arr.length) return ''
          let g =
            '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:' +
            tagColor +
            ';margin:14px 0 7px;padding:5px 9px;background:var(--s2);border-radius:var(--r);display:inline-flex;align-items:center;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:' +
            tagColor +
            '"></span>' +
            label +
            ' &middot; ' +
            arr.length +
            '</div>'
          arr.forEach((f) => {
            const ico = fileIco(f.mimeType, f.name)
            const isVid = ico.isVideo || isVideoMime(f.mimeType)
            g +=
              '<div class="fcard" data-prev="' +
              f.id +
              '" data-url="' +
              f.url +
              '"><div class="fc-ico" style="background:' +
              ico.bg +
              '">' +
              ico.lbl +
              '</div><div style="flex:1;min-width:0"><div class="fc-nm">' +
              f.name +
              '</div><div class="fc-mt">' +
              fSz(f.size) +
              ' &middot; ' +
              fDs(f.date) +
              '</div>' +
              (isVid
                ? '<div style="margin-top:6px"><video class="vid-preview" controls preload="none" src="https://drive.google.com/uc?export=download&id=' +
                  f.id +
                  '" style="max-height:200px">Sin soporte video.</video></div>'
                : '') +
              '</div>' +
              (can.manageFiles()
                ? '<div style="display:flex;gap:4px;flex-shrink:0"><button class="btn btn-g btn-xs" data-frename="' +
                  f.id +
                  '" data-fname="' +
                  encodeURIComponent(f.name) +
                  '">&#9998;</button><button class="btn btn-g btn-xs" data-fdelete="' +
                  f.id +
                  '" data-fname="' +
                  encodeURIComponent(f.name) +
                  '" data-ftid="' +
                  t.Ticket_ID +
                  '" style="color:var(--rbd)">&times;</button></div>'
                : '') +
              '</div>'
          })
          return g
        }
        return (
          h +
          renderGroup('Documentos iniciales', iniciales, 'var(--bld)') +
          renderGroup('Documentos del trabajo', trabajo, 'var(--gd)')
        )
      }

      /* ═══ REPORTE DE CIERRE v2.1 ═══ */
      const openWorkReportModal = (ticketOrData) => {
        if (ticketOrData && ticketOrData.ticket) {
          _renderWorkReport(ticketOrData)
          return
        }
        const t = ticketOrData
        const wrap = document.createElement('div')
        wrap.className = 'wr-overlay'
        wrap.innerHTML =
          '<div class="wr-modal"><div class="wr-modal-top"><div class="wr-modal-title"><span class="spin"></span> Generando reporte...</div></div></div>'
        document.body.appendChild(wrap)
        wrap.onclick = (e) => {
          if (e.target === wrap) wrap.remove()
        }
        lp.start()
        api.generateReport(t.Ticket_ID, (r) => {
          lp.done()
          wrap.remove()
          if (r && r.success) _renderWorkReport(r)
          else toast((r && r.error) || 'Error generando reporte', 'er')
        })
      }

      const _renderWorkReport = (data) => {
        const { ticket: t, avances, items, files, durHoras, generadoEn, empresa } = data
        const wrap = document.createElement('div')
        wrap.className = 'wr-overlay'
        const resolvedItems = (items || []).filter(
          (i) => i.estado === 'resuelto'
        ).length
        let rh = '<div class="wr">'
        rh +=
          '<div class="wr-hdr"><div><div class="wr-hdr-company">' +
          (empresa || 'Ingegar Chile SpA') +
          '</div><div class="wr-hdr-title">Reporte de Cierre</div><div class="wr-hdr-sub">Requerimiento de Mantencion</div></div><div class="wr-hdr-right"><div class="wr-hdr-id">' +
          t.Ticket_ID +
          '</div><div class="wr-hdr-date">' +
          (generadoEn || new Date().toLocaleDateString('es-CL')) +
          '</div>' +
          (durHoras
            ? '<div class="wr-hdr-dur">' + durHoras + 'h de trabajo</div>'
            : '') +
          '</div></div>'
        rh +=
          '<div class="wr-sec"><div class="wr-sec-title">Informacion del Requerimiento</div><div class="wr-fields">'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">Sucursal</div><div class="wr-field-val">' +
          (t.Sucursal || '—') +
          '</div></div>'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">Categoria</div><div class="wr-field-val">' +
          (t.Categoria || '—') +
          '</div></div>'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">Urgencia</div><div class="wr-field-val">' +
          t.Urgencia +
          '</div></div>'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">Tecnico</div><div class="wr-field-val">' +
          (t.Tecnico || '—') +
          '</div></div>'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">OT Numero</div><div class="wr-field-val">' +
          (t.OT_Numero || '—') +
          '</div></div>'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">Fecha apertura</div><div class="wr-field-val">' +
          fD(t.Fecha_Creacion) +
          '</div></div>'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">Fecha cierre</div><div class="wr-field-val">' +
          (t.Fecha_Cierre ? fD(t.Fecha_Cierre) : '—') +
          '</div></div>'
        rh +=
          '<div class="wr-field"><div class="wr-field-lbl">Items resueltos</div><div class="wr-field-val">' +
          resolvedItems +
          ' / ' +
          (items || []).length +
          '</div></div>'
        rh += '</div></div>'
        rh +=
          '<div class="wr-sec"><div class="wr-sec-title">Descripcion del Problema</div><div class="wr-av-text">' +
          (t.Descripcion || 'Sin descripcion.') +
          '</div></div>'
        if (avances && avances.length) {
          rh +=
            '<div class="wr-sec"><div class="wr-sec-title">Registro de Trabajo (' +
            avances.length +
            ' avances)</div>'
          avances.forEach((av, i) => {
            rh +=
              '<div class="wr-avance"><div class="wr-av-hdr"><div class="wr-av-n">' +
              (i + 1) +
              '</div><div><div class="wr-av-fecha">' +
              fD(av.fecha || av.Fecha || '') +
              '</div><div class="wr-av-tec">' +
              (av.tecnico || t.Tecnico || '—') +
              (av.ot ? ' &middot; OT ' + av.ot : '') +
              '</div></div></div><div class="wr-av-text">' +
              (av.resumen || av.summary || 'Sin resumen') +
              '</div></div>'
          })
        }
        if (items && items.length) {
          rh += '<div class="wr-sec"><div class="wr-sec-title">Sub-tareas</div>'
          items.forEach((it) => {
            const done = it.estado === 'resuelto'
            rh +=
              '<div class="wr-item"><div class="wr-item-dot ' +
              (done ? 'res' : 'pen') +
              '">' +
              (done ? '&#10003;' : '&#9711;') +
              '</div><div style="flex:1">' +
              it.titulo +
              '</div><div style="font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px">' +
              (done ? 'Resuelto' : 'Pendiente') +
              '</div></div>'
          })
        }
        if (files && files.length) {
          rh +=
            '<div class="wr-sec"><div class="wr-sec-title">Archivos adjuntos (' +
            files.length +
            ')</div>'
          files.forEach((f) => {
            const ico = fileIco(f.mimeType || '', f.name || '')
            rh +=
              '<div class="wr-file"><div style="width:22px;height:22px;background:' +
              ico.bg +
              ';color:#fff;border-radius:4px;display:grid;place-items:center;font-size:9px;font-weight:700;flex-shrink:0">' +
              ico.lbl +
              '</div><div style="flex:1;min-width:0;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
              f.name +
              '</div><div style="font-size:10px;color:var(--t3)">' +
              (f.size ? fSz(f.size) : '') +
              '</div></div>'
          })
        }
        rh +=
          '<div class="wr-footer"><div class="wr-sign"><div class="wr-sign-line"></div><div class="wr-sign-lbl">Tecnico de mantencion</div></div><div class="wr-sign"><div class="wr-sign-line"></div><div class="wr-sign-lbl">Encargado sucursal</div></div><div class="wr-sign"><div class="wr-sign-line"></div><div class="wr-sign-lbl">Jefe de operaciones Ingegar</div></div><div class="wr-powered">Generado por Sistema de Mantencion &middot; Ingegar Chile SpA &middot; v2.1</div></div></div>'

        wrap.innerHTML =
          '<div class="wr-modal"><div class="wr-modal-top"><div class="wr-modal-title">&#128206; Reporte de Cierre &mdash; ' +
          t.Ticket_ID +
          '</div><div class="wr-modal-btns"><button class="btn btn-s btn-sm" id="wrPrint">&#128424; Imprimir</button><button class="btn btn-g btn-sm" id="wrClose">&times; Cerrar</button></div></div><div class="wr-body">' +
          rh +
          '</div></div>'
        document.body.appendChild(wrap)
        const closeWr = () => wrap.remove()
        wrap.querySelector('#wrClose').onclick = closeWr
        wrap.onclick = (e) => {
          if (e.target === wrap) closeWr()
        }
        wrap.querySelector('#wrPrint').onclick = () => window.print()
      }

      /* ═══ MODALES ═══ */
      const showModal = (html, cls) => {
        const ov = document.createElement('div')
        ov.className = 'overlay center'
        ov.innerHTML = '<div class="mini-modal ' + (cls || '') + '">' + html + '</div>'
        document.body.appendChild(ov)
        ov.onclick = (e) => {
          if (e.target === ov) ov.remove()
        }
        return ov
      }
      const removeModals = () =>
        document.querySelectorAll('.overlay.center').forEach((m) => m.remove())

      const openSetupModal = (t) => {
        const tecOpts = (S.cfg.tecnicos || D_TEC)
          .map((tt) => {
            const n = typeof tt === 'string' ? tt : tt.nombre
            return (
              '<option ' + (t.Tecnico === n ? 'selected' : '') + '>' + n + '</option>'
            )
          })
          .join('')
        const ov = showModal(
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-size:14px;font-weight:700">' +
            (t.Tecnico ? 'Editar asignacion' : 'Asignar tecnico / OT / fecha') +
            '</div><button class="px" id="smClose">&times;</button></div><div class="fg2"><div class="fg"><label class="fl">Tecnico</label><div class="select-wrap"><select id="smTec" class="fi"><option value="">Sin asignar</option>' +
            tecOpts +
            '</select></div></div><div class="fg"><label class="fl">OT Numero</label><input id="smOT" class="fi" value="' +
            (t.OT_Numero || '') +
            '" placeholder="OT-2026-XXX"></div><div class="fg fgf"><label class="fl">Fecha estimada</label><input id="smDate" class="fi" type="date" value="' +
            (t.Fecha_Estimada || '') +
            '"></div></div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px"><button class="btn btn-s" id="smCancel">Cancelar</button><button class="btn btn-p" id="smSave">Guardar</button></div>'
        )
        ov.querySelector('#smClose').onclick = ov.querySelector('#smCancel').onclick =
          () => ov.remove()
        ov.querySelector('#smSave').onclick = function () {
          if (this.disabled) return
          const sb = this
          sb.disabled = true
          lp.start()
          const tec = (ov.querySelector('#smTec') || {}).value || ''
          const ot = (ov.querySelector('#smOT') || {}).value || ''
          const date = (ov.querySelector('#smDate') || {}).value || ''
          api.saveSetup(
            t.Ticket_ID,
            { Tecnico: tec, OT_Numero: ot, Fecha_Estimada: date },
            (r) => {
              if (r && r.success) {
                const wasN = S.sel && S.sel.Estado === 'Nuevo'
                Object.assign(S.sel || {}, {
                  Tecnico: tec,
                  OT_Numero: ot,
                  Fecha_Estimada: date,
                })
                if (wasN && tec.trim() && S.sel) S.sel.Estado = 'En revision'
                const tf = S.tickets.find((x) => x.Ticket_ID === t.Ticket_ID)
                if (tf) {
                  Object.assign(tf, {
                    Tecnico: tec,
                    OT_Numero: ot,
                    Fecha_Estimada: date,
                  })
                  if (wasN && tec.trim()) tf.Estado = 'En revision'
                }
                cache.save(S.user, S.tickets)
                ov.remove()
                rp()
                toast('Asignación guardada', 'ok')
              } else {
                var sb = this
                sb.disabled = false
                sb.innerHTML = 'Guardar'
                toast((r && r.error) || 'Error guardando', 'er')
              }
            }
          )
        }
      }

      /* ═══ STATUS CHANGE ═══ */
      const doChangeStatus = (t, newEst, cb) => {
        if (t.Estado === newEst) return
        /* v2.1: Si es Resuelto, ofrecer generar reporte de cierre antes de confirmar */
        if (newEst === 'Resuelto') {
          const itemsArr = S.items[t.Ticket_ID] || []
          const pendingItems = itemsArr.filter(
            (it) => it.estado === 'pendiente' || it.estado === 'proceso'
          )
          if (pendingItems.length) {
            const ov = showModal(
              '<div style="margin-bottom:16px"><div style="font-size:14px;font-weight:700;color:var(--amd);margin-bottom:6px">&#9888; Items pendientes</div><div style="font-size:12px;color:var(--t3)">Hay ' +
                pendingItems.length +
                ' item' +
                (pendingItems.length > 1 ? 's' : '') +
                ' sin resolver. ¿Qué quieres hacer?</div></div><div style="display:flex;flex-direction:column;gap:6px"><button class="btn btn-ok" id="resForceNew">Cerrar &amp; crear nuevo ticket con los pendientes</button><button class="btn btn-s" id="resForce">Cerrar de todas formas</button><button class="btn btn-g" id="resCancel">Cancelar</button></div>'
            )
            ov.querySelector('#resCancel').onclick = () => ov.remove()
            ov.querySelector('#resForce').onclick = () => {
              ov.remove()
              _confirmResolve(t, newEst, cb)
            }
            ov.querySelector('#resForceNew').onclick = () => {
              ov.remove()
              const ids = pendingItems.map((it) => it.id)
              api.closeWithPending(t.Ticket_ID, ids, true, (r) => {
                if (r && r.success) {
                  api.update(t.Ticket_ID, { Estado: 'Resuelto' }, S.user, () => {})
                  toast(r.message || 'Cerrado y nuevo ticket creado', 'ok')
                  if (r.newTicketId)
                    toast('Nuevo ticket: ' + r.newTicketId, 'info', 5000)
                  api.tickets(S.role, S.user, (ts) => {
                    if (ts && ts.success) {
                      S.tickets = ts.tickets
                      cache.save(S.user, ts.tickets)
                    }
                    R()
                  })
                } else toast((r && r.error) || 'Error', 'er')
              })
            }
            return
          }
          _confirmResolve(t, newEst, cb)
          return
        }
        _applyStatus(t, newEst, cb)
      }

      const _confirmResolve = (t, newEst, cb) => {
        const ov = showModal(
          '<div style="margin-bottom:14px"><div style="font-size:14px;font-weight:700;margin-bottom:4px">Cerrar ticket</div><div style="font-size:12px;color:var(--t3)">¿Confirmas que el requerimiento fue resuelto?</div></div><div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-ok" id="resWithReport">&#10003; Resolver &amp; generar reporte de cierre</button><button class="btn btn-s" id="resSimple">&#10003; Resolver (sin reporte)</button><button class="btn btn-g" id="resCancel2">Cancelar</button></div>'
        )
        ov.querySelector('#resCancel2').onclick = () => ov.remove()
        ov.querySelector('#resSimple').onclick = () => {
          ov.remove()
          _applyStatus(t, newEst, cb)
        }
        ov.querySelector('#resWithReport').onclick = () => {
          ov.remove()
          _applyStatus(t, newEst, () => {
            setTimeout(() => openWorkReportModal(S.sel || t), 400)
          })
        }
      }

      const _applyStatus = (t, newEst, cb) => {
        if (!t || !newEst) return
        if (t.Estado === newEst) {
          if (cb) cb()
          return
        }
        if (S._stateChanging) {
          toast('Espera...', 'info', 2000)
          if (cb) cb()
          return
        }
        const oldEst = t.Estado,
          oldCierre = t.Fecha_Cierre || '',
          isCierre = ['Resuelto', 'Cancelado'].includes(newEst),
          today = localToday()
        t.Estado = newEst
        if (isCierre) t.Fecha_Cierre = today
        const tf = S.tickets.find((x) => x.Ticket_ID === t.Ticket_ID)
        if (tf) {
          tf.Estado = newEst
          if (isCierre) tf.Fecha_Cierre = today
        }
        cache.save(S.user, S.tickets)
        rp()
        if (cb) cb()
        S._stateChanging = true
        lp.start()
        const updates = { Estado: newEst }
        if (isCierre) updates.Fecha_Cierre = today
        api.update(t.Ticket_ID, updates, S.user, (r) => {
          lp.done()
          S._stateChanging = false
          if (r && r.success !== false) toast('Estado: ' + newEst, 'ok')
          else {
            t.Estado = oldEst
            t.Fecha_Cierre = oldCierre
            if (tf) {
              tf.Estado = oldEst
              tf.Fecha_Cierre = oldCierre
            }
            cache.save(S.user, S.tickets)
            rp()
            toast((r && r.error) || 'Error al cambiar estado', 'er')
          }
        })
      }

      /* ═══ BIND ═══ */
      const bind = () => {
        /* Topbar */
        const mBtn = $('mBtn')
        if (mBtn) mBtn.onclick = openDrawer
        const sbClose = $('sbClose')
        if (sbClose) sbClose.onclick = closeDrawer
        const drawerOv = $('drawerOv')
        if (drawerOv) drawerOv.onclick = closeDrawer
        const darkBtn = $('darkBtn')
        if (darkBtn)
          darkBtn.onclick = () => {
            S.dark = !S.dark
            R()
          }
        const logoutBtn = $('logoutBtn')
        if (logoutBtn) logoutBtn.onclick = logout
        /* Nav */
        document.querySelectorAll('[data-nav]').forEach(
          (b) =>
            (b.onclick = function () {
              const target = b.dataset.nav
              S.view = target
              S.sel = null
              closeDrawer()
              try {
                const _sv = JSON.parse(localStorage.getItem('jb_auth') || '{}')
                if (_sv.token) {
                  _sv.view = target
                  localStorage.setItem('jb_auth', JSON.stringify(_sv))
                }
                const _ss = JSON.parse(sessionStorage.getItem('jb_auth_s') || '{}')
                if (_ss.token) {
                  _ss.view = target
                  sessionStorage.setItem('jb_auth_s', JSON.stringify(_ss))
                }
              } catch (e) {}
              R()
              if (
                target === 'tickets' &&
                (S.role === 'tecnico' || S.role === 'cliente')
              ) {
                api.tickets(S.role, S.user, (ts) => {
                  if (ts && ts.success) {
                    S.tickets = ts.tickets
                    cache.save(S.user, ts.tickets)
                  }
                  if (S.view === 'tickets' && !S.sel) R()
                })
              }
            })

        /* Filters */
        const fQ = $('fQ')
        if (fQ)
          fQ.oninput = debounce((e) => {
            S.fil.q = e.target.value
            R()
          }, 260)
        document.querySelectorAll('[data-pre]').forEach(

            (b.onclick = () => {
              S.fil.preset = b.dataset.pre
              S.fil.grupo = ''
              R()
            })
        )
        document.querySelectorAll('[data-grp]').forEach(
